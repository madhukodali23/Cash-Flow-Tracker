<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cash Flow Tracker</title>

  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <div class="app">

    <div class="header">
      <h1>Cash Flow Tracker</h1>
      <p>Manage your income and expenses smartly</p>
    </div>

    <div class="card">
      <h2>Set Salary</h2>
      <input type="number" id="salaryInput" placeholder="Enter salary">
      <button id="setSalaryBtn">Set Salary</button>
    </div>

    <div class="card">
      <h2>Add Expense</h2>
      <input type="text" id="expenseName" placeholder="Expense name">
      <input type="number" id="expenseAmount" placeholder="Amount">
      <button id="addExpenseBtn">Add Expense</button>
    </div>

    <div class="card summary">
      <div class="summary-box">
        <span>Salary</span>
        <h3>₹<span id="salaryDisplay">0</span></h3>
      </div>

      <div class="summary-box">
        <span>Expenses</span>
        <h3>₹<span id="totalExpense">0</span></h3>
      </div>

      <div class="summary-box balance-box">
        <span>Balance</span>
        <h2>₹<span id="balance">0</span></h2>
      </div>
    </div>

    <div class="card">
      <h2>Expenses</h2>
      <ul id="expenseList"></ul>
    </div>

    <div class="card">
      <h2>Overview</h2>
      <canvas id="chart"></canvas>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
